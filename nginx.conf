worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Suporte para WebSockets (SignalR)
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    server {
        listen 8888;
        server_name localhost;

        # 1. FRONTEND (A Raiz vai para o container Vue)
        location / {
            proxy_pass http://frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }

        # 2. SPORTBOOK API
        location /sportbook/ {
            proxy_pass http://sportbook:8080/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. GAMEHUB (SIGNALR) - Rota Crítica
        location /gameHub {
            # O Hub do Sportbook geralmente responde na raiz ou /gameHub
            proxy_pass http://sportbook:8080;
            
            # Configuração vital para WebSockets
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # ========================================================
        # 6. TOURNAMENT HUB (SIGNALR) - NOVA ROTA
        # ========================================================
        location /tournamentHub {
            # Aponta para o container do torneio na porta 8080
            proxy_pass http://tournament:8080;
            
            # Configurações Obrigatórias para WebSockets (SignalR)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Repassa o IP real (importante para logs e segurança)
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 4. OUTROS SERVIÇOS (CORE)
        location /core/ {
            proxy_pass http://core:8080/;

            # Configuração vital para WebSockets (UserHub do Core)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
        
        location /slot/ {
            proxy_pass http://slot:8080/;
        }

        # ========================================================
        # 5. TOURNAMENT API (ROTAS ESPECÍFICAS E GERAIS)
        # ========================================================

        # ✅ ROTA ESPECÍFICA PARA TEMPLATES
        location /api/tournament/templates {
            proxy_pass http://tournament:8080/api/TournamentTemplates;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Rota Geral para Torneios
        location /api/tournament/ {
            proxy_pass http://tournament:8080/api/tournaments/;
            
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ========================================================
        # 6. CORE API (Genérico - Fallback)
        # ========================================================
        location /api/ {
            proxy_pass http://core:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}