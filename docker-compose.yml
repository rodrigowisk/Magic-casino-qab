services:
  # ✅ FRONTEND
  frontend:
    build:
      context: .
      dockerfile: magic-casino-front/Dockerfile
    container_name: frontend
    image: magic-casino-frontend:prod
    expose:
      - "80"
    restart: always
    depends_on:
      - core

  # ✅ REDIS
  redis:
    image: redis:alpine
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no
  
  # ✅ CORE (Backend Principal)
  core:
    build:
      context: .
      dockerfile: Magic-casino/Dockerfile
    image: magic-casino-core:prod
    container_name: core
    environment:
      ConnectionStrings__Redis: "redis:6379"
      ConnectionStrings__DefaultConnection: "${DB_CONN_CORE}"
      Jwt__Key: "${JWT_SECRET}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      VELANA_API_KEY: "${VELANA_API_KEY}"
      MY_API_URL: "${MY_API_URL}"
    expose:
      - "8080"
    restart: always
    depends_on:
      - redis

  # ✅ SPORTBOOK (CORRIGIDO AQUI)
  sportbook:
    build:
      context: .
      dockerfile: Magic-casino-sportbook/Dockerfile
    image: magic-casino-sportbook:prod
    container_name: sportbook
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      
      # 🔥 CORREÇÃO: Variável exata que o Program.cs procura
      REDIS_CONNECTION_STRING: "redis:6379,abortConnect=false"
      
      # Mantemos a antiga por segurança
      ConnectionStrings__Redis: "redis:6379"
      ConnectionStrings__DefaultConnection: "${DB_CONN_SPORTBOOK}"
      OddsApiKey: "${ODDS_API_KEY}"
      Jwt__Key: "${JWT_SECRET}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
      ODDS_PROVIDER: "${ODDS_PROVIDER}"
      BETSAPI_TOKEN: "${BETSAPI_TOKEN}"
    expose:
      - "8080"
    restart: always
    depends_on:
      - redis

  # ✅ SLOT
  slot:
    build:
      context: .
      dockerfile: Magic-casino-slot/Dockerfile
    image: magic-casino-slot:prod
    container_name: slot
    environment:
      ConnectionStrings__Redis: "redis:6379"
      ConnectionStrings__DefaultConnection: "${DB_CONN_SLOT}"
      Jwt__Key: "${JWT_SECRET}"
      Jwt__Issuer: "${JWT_ISSUER}"
      Jwt__Audience: "${JWT_AUDIENCE}"
    expose:
      - "8080"
    restart: always
    depends_on:
      - redis

  # 🚦 GATEWAY (NGINX)
  nginx:
    image: nginx:alpine
    container_name: nginx_gateway
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8888:8888"
    depends_on:
      - frontend
      - sportbook
      - core
      - slot
    restart: always